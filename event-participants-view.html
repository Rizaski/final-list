<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event participants – Campaign</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="event-share-page">
    <section class="split-layout__panel event-share-panel">
      <header class="panel-header event-share-panel__header">
        <div class="panel-header-main">
          <h1 id="eventShareTitle">Loading…</h1>
          <p id="eventShareSubtitle" class="panel-subtitle">Shared participants list. You can add and edit rows.</p>
        </div>
        <div class="event-share-toolbar__left">
          <button type="button" class="ghost-button ghost-button--small" id="eventShareRefreshBtn">Refresh</button>
          <button type="button" class="primary-button" id="eventShareAddBtn">Add participant</button>
        </div>
      </header>
      <div class="event-share-toolbar modal-list-toolbar list-toolbar">
        <div class="list-toolbar__search">
          <label for="eventShareSearch" class="sr-only">Search participants</label>
          <input type="search" id="eventShareSearch" class="input" placeholder="Search by name, ID, phone, address, notes…">
        </div>
      </div>
      <div class="event-share-table-wrap table-wrapper">
        <table class="data-table" id="eventShareTable">
          <thead>
            <tr>
              <th class="data-table-col--name">Name</th>
              <th>ID Number</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="eventShareTbody"></tbody>
        </table>
      </div>
      <p id="eventShareEmpty" class="text-muted event-share-empty" style="display:none;">No participants yet.</p>
    </section>
  </main>
  <script type="module" src="event-participants-view.js"></script>
</body>
</html>
